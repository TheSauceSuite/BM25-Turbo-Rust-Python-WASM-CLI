<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="turbo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tantivy" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="elastic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="python" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Query Throughput — MS MARCO (8.8M documents)</text>
  <text x="400" y="55" text-anchor="middle" fill="#7d8590" font-size="12">queries/second, higher is better · single-threaded</text>

  <!-- Grid lines -->
  <line x1="200" y1="75" x2="200" y2="275" stroke="#21262d" stroke-width="1"/>
  <line x1="350" y1="75" x2="350" y2="275" stroke="#21262d" stroke-width="1"/>
  <line x1="500" y1="75" x2="500" y2="275" stroke="#21262d" stroke-width="1"/>
  <line x1="650" y1="75" x2="650" y2="275" stroke="#21262d" stroke-width="1"/>

  <!-- Grid labels -->
  <text x="200" y="290" text-anchor="middle" fill="#7d8590" font-size="10">0</text>
  <text x="350" y="290" text-anchor="middle" fill="#7d8590" font-size="10">10K</text>
  <text x="500" y="290" text-anchor="middle" fill="#7d8590" font-size="10">20K</text>
  <text x="650" y="290" text-anchor="middle" fill="#7d8590" font-size="10">30K</text>

  <!-- BM25 Turbo -->
  <text x="190" y="108" text-anchor="end" fill="#e6edf3" font-size="13" font-weight="500">BM25 Turbo</text>
  <text x="190" y="122" text-anchor="end" fill="#7d8590" font-size="10">(Rust)</text>
  <rect x="200" y="95" width="425" height="32" rx="4" fill="url(#turbo)"/>
  <text x="635" y="116" fill="#e6edf3" font-size="13" font-weight="700">28,217</text>

  <!-- Tantivy -->
  <text x="190" y="163" text-anchor="end" fill="#e6edf3" font-size="13" font-weight="500">Tantivy</text>
  <text x="190" y="177" text-anchor="end" fill="#7d8590" font-size="10">(Rust)</text>
  <rect x="200" y="150" width="180" height="32" rx="4" fill="url(#tantivy)"/>
  <text x="390" y="171" fill="#e6edf3" font-size="13" font-weight="700">~12,000</text>

  <!-- Elasticsearch -->
  <text x="190" y="218" text-anchor="end" fill="#e6edf3" font-size="13" font-weight="500">Elasticsearch</text>
  <text x="190" y="232" text-anchor="end" fill="#7d8590" font-size="10">(Java)</text>
  <rect x="200" y="205" width="12" height="32" rx="4" fill="url(#elastic)"/>
  <text x="222" y="226" fill="#e6edf3" font-size="13" font-weight="700">~800</text>

  <!-- bm25s -->
  <text x="190" y="268" text-anchor="end" fill="#e6edf3" font-size="13" font-weight="500">bm25s</text>
  <text x="190" y="282" text-anchor="end" fill="#7d8590" font-size="10">(Python)</text>
  <rect x="200" y="255" width="2" height="32" rx="1" fill="url(#python)"/>
  <text x="212" y="276" fill="#e6edf3" font-size="13" font-weight="700">~12</text>

  <!-- Speedup callout -->
  <rect x="560" y="255" width="220" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3"/>
  <text x="670" y="276" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">⚡ 2,351× faster than bm25s</text>
</svg>
