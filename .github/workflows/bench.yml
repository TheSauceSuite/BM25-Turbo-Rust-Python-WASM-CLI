name: Benchmarks

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: BEIR Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache BEIR datasets
        uses: actions/cache@v4
        with:
          path: beir_cache/
          key: beir-datasets-v1

      - name: Build benchmark binary (release)
        run: cargo build -p bm25-turbo-bench --release --bin beir_bench

      - name: Run BEIR benchmarks
        run: cargo run -p bm25-turbo-bench --release --bin beir_bench -- --datasets scifact,fiqa --output benchmark-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  compare:
    name: Python Comparison (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: bench
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache BEIR datasets
        uses: actions/cache@v4
        with:
          path: beir_cache/
          key: beir-datasets-v1

      - name: Build and run Rust benchmarks
        run: cargo run -p bm25-turbo-bench --release --bin beir_bench -- --datasets scifact,fiqa --output benchmark-results.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r benchmarks/compare/requirements.txt

      - name: Run bm25s benchmarks
        run: python benchmarks/compare/bm25s_bench.py --datasets scifact,fiqa --output bm25s-results.json

      - name: Compare results
        run: python benchmarks/compare/compare_results.py --rust benchmark-results.json --python bm25s-results.json --output comparison.md

      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: comparison-report
          path: comparison.md
